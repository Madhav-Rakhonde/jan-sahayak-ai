spring.application.name=Jan-Sahayak-AI
server.port=${PORT:8081}

# Drastically reduces Render cold start times (~30s -> ~10s) by deferring bean creation
spring.main.lazy-initialization=true

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/awaazsetu?sslmode=disable&useUnicode=true&characterEncoding=utf8}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:awaaz_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:strongpassword}
spring.datasource.driver-class-name=org.postgresql.Driver



spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# 🚀 Performance Optimizations (Eliminates N+1 queries)
spring.jpa.properties.hibernate.default_batch_fetch_size=100
spring.jpa.properties.hibernate.query.in_clause_parameter_padding=true
# HikariCP — tuned for concurrent API load
# pool-size 25: handles concurrent feed+chat+notifications without timeout
spring.datasource.hikari.maximum-pool-size=25
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.leak-detection-threshold=60000
# keepalive: prevents Supabase/Render from dropping idle connections
spring.datasource.hikari.keepalive-time=60000
# Prepared-statement cache: saves ~15% query parse time per request
spring.datasource.hikari.data-source-properties.prepStmtCacheSize=250
spring.datasource.hikari.data-source-properties.prepStmtCacheSqlLimit=2048
spring.datasource.hikari.data-source-properties.cachePrepStmts=true

# ? Required for Supabase (SSL must be enabled)
# spring.datasource.hikari.data-source-properties.ssl=true
# spring.datasource.hikari.data-source-properties.sslmode=require

# ?? Cloudinary Storage ????????????????????????????????????????????????????????
# Set these as environment variables on Render (NEVER commit real values here).
#
#   CLOUDINARY_CLOUD_NAME   ? your Cloudinary cloud name
#   CLOUDINARY_API_KEY      ? your API key
#   CLOUDINARY_API_SECRET   ? your API secret
#
# All three map to the exact env var names Cloudinary expects.
# Files go to: jansahayak/posts/ and jansahayak/social-posts/
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}
cloudinary.folder.posts=jansahayak/posts
cloudinary.folder.social-posts=jansahayak/social-posts

# ?? Legacy upload dirs (kept for backward compat ? no longer used for storage) ?
# DriveStorageService is removed; CloudinaryStorageService handles all uploads.
# StaticResourceConfig still references these but is harmless dead code.
app.upload.dir=${user.home}/uploads/posts
app.social.upload.dir=${user.home}/uploads/social-posts

# ?? File size limits ??????????????????????????????????????????????????????????
app.upload.max-image-size=5242880
app.upload.max-video-size=536870912
app.upload.max-gif-size=15728640

# ?? Media specifications ??????????????????????????????????????????????????????
app.media.max-video-duration=140
app.media.max-image-width=4096
app.media.max-image-height=4096
app.media.min-image-dimension=1
app.media.max-video-resolution=1920
app.media.min-video-resolution=32
app.media.max-video-frame=40.0
app.media.max-video-bitrate=25000000

# ?? Multipart ?????????????????????????????????????????????????????????????????
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=512MB
spring.servlet.multipart.max-request-size=512MB
spring.servlet.multipart.resolve-lazily=false
spring.servlet.multipart.location=${java.io.tmpdir}
spring.servlet.multipart.file-size-threshold=0

# Tomcat — thread pool expansion for concurrent API traffic
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=20
server.tomcat.accept-count=100
server.tomcat.max-swallow-size=512MB
server.tomcat.max-http-form-post-size=512MB

# GZIP compression — reduces JSON feed payloads from ~80KB to ~15KB (60-70% bandwidth savings)
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain
server.compression.min-response-size=1024

# Java 21 Virtual Threads — 1-line change, 2-5x I/O-bound throughput boost
# Spring Boot 3.2+ switches Tomcat executor to virtual threads automatically.
spring.threads.virtual.enabled=true

# ?? Country & Broadcasting ????????????????????????????????????????????????????
app.country.code=IN
app.country.name=India
app.country.default=true
app.broadcast.country.default=IN
app.broadcast.country.enabled=true
app.broadcast.max.states=36
app.broadcast.max.districts=800
app.broadcast.max.pincodes=1000
app.pincode.pattern=\\d{6}
app.pincode.required=true
app.geographic.validation.enabled=true
app.broadcast.country.roles=ROLE_ADMIN,ROLE_DEPARTMENT
app.broadcast.state.roles=ROLE_ADMIN,ROLE_DEPARTMENT
app.broadcast.district.roles=ROLE_ADMIN,ROLE_DEPARTMENT
app.broadcast.area.roles=ROLE_ADMIN,ROLE_DEPARTMENT,ROLE_USER
app.broadcast.user.default.scope=AREA
app.broadcast.department.default.scope=DISTRICT
app.broadcast.admin.default.scope=COUNTRY

# ?? CORS ??????????????????????????????????????????????????????????????????????
