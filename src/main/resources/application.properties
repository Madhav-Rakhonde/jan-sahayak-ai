spring.application.name=Jan-Sahayak-AI
server.port=8081


# File upload configuration (Twitter-compatible)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=512MB
spring.servlet.multipart.max-request-size=512MB

# Custom upload directory
app.upload.dir=${user.home}/uploads/posts

# Twitter-compatible file size limits
# Images: 5MB max (Twitter standard)
app.upload.max-image-size=5242880
# Videos: 512MB max (Twitter standard)
app.upload.max-video-size=536870912
# GIFs: 15MB max (Twitter standard)
app.upload.max-gif-size=15728640


# Logging configuration for media operations
logging.level.com.JanSahayak.AI.service.PostService=DEBUG


# Video duration limit (in seconds) - Twitter allows up to 2:20 (140 seconds)
app.media.max-video-duration=140

# Image dimension limits (Twitter standards)
app.media.max-image-width=4096
app.media.max-image-height=4096
app.media.min-image-dimension=1

# Video specifications (Twitter standards)
app.media.max-video-resolution=1920
app.media.min-video-resolution=32
app.media.max-video-frame=40.0
app.media.max-video-bitrate=25000000

# Database configuration
spring.datasource.url=jdbc:mysql://localhost:3306/AI
spring.datasource.username=root
spring.datasource.password=Mr.7758091218@
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
#create , update , create-drop ,validate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

logging.level.org.springframework.boot.autoconfigure=DEBUG
logging.level.org.hibernate=DEBUG
logging.level.org.springframework.orm.jpa=DEBUG

# Application Country Configuration
app.country.code=IN
app.country.name=India
app.country.default=true

# Broadcasting Configuration
app.broadcast.country.default=IN
app.broadcast.country.enabled=true
app.broadcast.max.states=36
app.broadcast.max.districts=800
app.broadcast.max.pincodes=1000

# Geographic Validation
app.pincode.pattern=\\d{6}
app.pincode.required=true
app.geographic.validation.enabled=true

# User Role Broadcasting Permissions
app.broadcast.country.roles=admin,department
app.broadcast.state.roles=admin,department
app.broadcast.district.roles=admin,department
app.broadcast.area.roles=admin,department,user

# Default Broadcast Behavior
app.broadcast.user.default.scope=AREA
app.broadcast.department.default.scope=DISTRICT
app.broadcast.admin.default.scope=COUNTRY

