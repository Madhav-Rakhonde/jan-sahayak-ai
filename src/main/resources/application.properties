spring.application.name=Jan-Sahayak-AI
server.port=${PORT:8081}


spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/awaazsetu}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:awaaz_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:strongpassword}
spring.datasource.driver-class-name=org.postgresql.Driver


spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ?? HikariCP connection pool ??????????????????????????????????????????????????
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ?? Cloudinary Storage ????????????????????????????????????????????????????????
# Set these as environment variables on Render (NEVER commit real values here).
#
#   CLOUDINARY_CLOUD_NAME   ? your Cloudinary cloud name
#   CLOUDINARY_API_KEY      ? your API key
#   CLOUDINARY_API_SECRET   ? your API secret
#
# All three map to the exact env var names Cloudinary expects.
# Files go to: jansahayak/posts/ and jansahayak/social-posts/
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}
cloudinary.folder.posts=jansahayak/posts
cloudinary.folder.social-posts=jansahayak/social-posts

# ?? Legacy upload dirs (kept for backward compat ? no longer used for storage) ?
# DriveStorageService is removed; CloudinaryStorageService handles all uploads.
# StaticResourceConfig still references these but is harmless dead code.
app.upload.dir=${user.home}/uploads/posts
app.social.upload.dir=${user.home}/uploads/social-posts

# ?? File size limits ??????????????????????????????????????????????????????????
app.upload.max-image-size=5242880
app.upload.max-video-size=536870912
app.upload.max-gif-size=15728640

# ?? Media specifications ??????????????????????????????????????????????????????
app.media.max-video-duration=140
app.media.max-image-width=4096
app.media.max-image-height=4096
app.media.min-image-dimension=1
app.media.max-video-resolution=1920
app.media.min-video-resolution=32
app.media.max-video-frame=40.0
app.media.max-video-bitrate=25000000

# ?? Multipart ?????????????????????????????????????????????????????????????????
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=512MB
spring.servlet.multipart.max-request-size=512MB
spring.servlet.multipart.resolve-lazily=false
spring.servlet.multipart.location=${java.io.tmpdir}
spring.servlet.multipart.file-size-threshold=0

# ?? Tomcat ????????????????????????????????????????????????????????????????????
server.tomcat.max-swallow-size=512MB
server.tomcat.max-http-form-post-size=512MB

# ?? Country & Broadcasting ????????????????????????????????????????????????????
app.country.code=IN
app.country.name=India
app.country.default=true
app.broadcast.country.default=IN
app.broadcast.country.enabled=true
app.broadcast.max.states=36
app.broadcast.max.districts=800
app.broadcast.max.pincodes=1000
app.pincode.pattern=\\d{6}
app.pincode.required=true
app.geographic.validation.enabled=true
app.broadcast.country.roles=ROLE_ADMIN,ROLE_DEPARTMENT
app.broadcast.state.roles=ROLE_ADMIN,ROLE_DEPARTMENT
app.broadcast.district.roles=ROLE_ADMIN,ROLE_DEPARTMENT
app.broadcast.area.roles=ROLE_ADMIN,ROLE_DEPARTMENT,ROLE_USER
app.broadcast.user.default.scope=AREA
app.broadcast.department.default.scope=DISTRICT
app.broadcast.admin.default.scope=COUNTRY

# ?? CORS ??????????????????????????????????????????????????????????????????????
spring.web.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
app.frontend.base-url=${FRONTEND_BASE_URL:http://localhost:5173}

# ?? JWT ???????????????????????????????????????????????????????????????????????
jwt.secret=${JWT_SECRET:your-local-dev-secret-change-in-production}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ?? Logging ???????????????????????????????????????????????????????????????????
logging.level.com.JanSahayak.AI.service.PostService=INFO
logging.level.com.JanSahayak.AI.service.CloudinaryStorageService=INFO
logging.level.org.springframework.boot.autoconfigure=WARN
logging.level.org.hibernate=WARN
logging.level.org.springframework.orm.jpa=WARN
logging.level.org.springframework.web.multipart=WARN
logging.level.org.apache.commons.fileupload=WARN
logging.level.com.JanSahayak.AI=INFO